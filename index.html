<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Payment successful</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #0f1116; color: #e8e8ea; padding: 24px;
  }
  .card {
    width: 100%; max-width: 440px; background: #1a1d24; border: 1px solid #2a2e38;
    border-radius: 18px; padding: 40px 32px; text-align: center;
  }
  .check {
    width: 72px; height: 72px; margin: 0 auto 24px; border-radius: 50%;
    background: #1f9d5510; border: 2px solid #1f9d55; display: flex; align-items: center; justify-content: center;
  }
  .check svg { width: 36px; height: 36px; stroke: #2ec27e; }
  h1 { font-size: 24px; font-weight: 600; margin: 0 0 12px; }
  p { font-size: 16px; line-height: 1.6; color: #b7bac2; margin: 0; }
  .dm { color: #e8e8ea; font-weight: 600; }
  .foot { margin-top: 22px; font-size: 13px; color: #6b6f7a; }
</style>
</head>
<body>
  <main class="card">
    <div class="check" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
    </div>
    <h1>Payment successful!</h1>
    <p>Thank you for your support. <span class="dm">Check your Discord DMs</span> — your download link and role are on their way, automatically.</p>
    <p class="foot">You can safely close this tab.</p>
  </main>
</body>
</html>
