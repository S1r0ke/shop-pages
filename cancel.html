<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Payment cancelled</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #0f1116; color: #e8e8ea; padding: 24px;
  }
  .card {
    width: 100%; max-width: 440px; background: #1a1d24; border: 1px solid #2a2e38;
    border-radius: 18px; padding: 40px 32px; text-align: center;
  }
  .mark {
    width: 72px; height: 72px; margin: 0 auto 24px; border-radius: 50%;
    background: #b4b6bc10; border: 2px solid #6b6f7a; display: flex; align-items: center; justify-content: center;
  }
  .mark svg { width: 34px; height: 34px; stroke: #9aa0ad; }
  h1 { font-size: 24px; font-weight: 600; margin: 0 0 12px; }
  p { font-size: 16px; line-height: 1.6; color: #b7bac2; margin: 0; }
  .foot { margin-top: 22px; font-size: 13px; color: #6b6f7a; }
</style>
</head>
<body>
  <main class="card">
    <div class="mark" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
    </div>
    <h1>Payment cancelled</h1>
    <p>No worries — <strong>you weren't charged</strong>. You can head back and try again anytime.</p>
    <p class="foot">You can safely close this tab.</p>
  </main>
</body>
</html>
